swagger: "2.0"
info:
  title: Bank Argent API documentation
  description: |
    API de référence pour la phase backend.
    - `profile` désigne la personne connectée (nom, prénom, pseudo, email éventuel)
    - `accounts` désigne les comptes bancaires de l'utilisateur
    - `transactions` désigne les opérations rattachées à un compte bancaire
    - `category` correspond à une valeur de référence affichée dans une liste déroulante
    - `page`, `limit`, `fromDate` et `toDate` sont documentés pour préparer pagination et filtrage par période

    Versioning retenu :
    - `/api/v1` pour l'authentification et le profil
    - `/api/v2` pour les comptes et transactions
  version: "1.0.0"
  termsOfService: "http://swagger.io/terms/"
host: localhost:3001
basePath: /api
schemes:
  - http
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
paths:
  /v1/user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: API for Login
      parameters:
        - in: body
          name: body
          description: Login Payload
          required: true
          schema:
            $ref: "#/definitions/Login"
      produces:
        - application/json
      responses:
        "200":
          description: Login Successfully
          schema:
            $ref: "#/definitions/LoginResponse"
        "400":
          description: Invalid Fields
        "500":
          description: Internal Server Error

  /v1/user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: API for Signup
      parameters:
        - in: body
          name: body
          description: Signup Payload
          required: true
          schema:
            $ref: "#/definitions/User"
      produces:
        - application/json
      responses:
        "200":
          description: Signup Successfully
          schema:
            $ref: "#/definitions/ApiResponse"
        "400":
          description: Invalid Fields
        "500":
          description: Internal Server Error

  /v1/user/profile:
    post:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for fetching a user profile
      produces:
        - application/json
      responses:
        "200":
          description: Profile retrieved successfully
          schema:
            $ref: "#/definitions/UserProfileResponse"
        "401":
          description: Unauthorized user
        "500":
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for updating a user profile
      parameters:
        - in: body
          name: body
          description: Update user profile attributes
          required: true
          schema:
            $ref: "#/definitions/UserProfileUpdate"
      produces:
        - application/json
      responses:
        "200":
          description: User profile retrieved successully
          schema:
            $ref: "#/definitions/UserProfileResponse"
        "400":
          description: Invalid Fields
        "500":
          description: Internal Server Error

  /v1/user/accounts:
    get:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Accounts API
      description: API for fetching the bank accounts linked to the authenticated user
      produces:
        - application/json
      responses:
        "200":
          description: Accounts retrieved successfully
          schema:
            $ref: "#/definitions/AccountListResponse"
        "401":
          description: Unauthorized user
        "500":
          description: Internal Server Error

  /v2/categories:
    get:
      security:
        - Bearer: []
      tags:
        - User Accounts and Transactions
      summary: Get transaction categories
      description: >
        API for retrieving the list of available categories for transactions.
        This list is managed server-side, making it easy to add, remove or rename
        categories without any frontend change.
      produces:
        - application/json
      responses:
        "200":
          description: Categories retrieved successfully
          schema:
            $ref: "#/definitions/CategoryListResponse"
        "401":
          description: Unauthorized user
        "500":
          description: Internal Server Error

  /v2/transactions/{accountID}:
    get:
      tags:
        - User Accounts and Transactions
      summary: Account transactions
      description: API for retrieving the transactions associated with a chosen account. Pagination and date filters are documented as optional query parameters.
      security:
        - Bearer: []
      parameters:
        - in: path
          name: accountID
          description: ID of an account
          required: true
          type: string
        - in: query
          name: page
          description: Page number for pagination (backend behavior to confirm if omitted)
          required: false
          type: integer
          format: int32
          default: 1
        - in: query
          name: limit
          description: Number of transactions per page (backend behavior to confirm if omitted)
          required: false
          type: integer
          format: int32
          default: 10
        - in: query
          name: fromDate
          description: Start date of the transaction range (inclusive)
          required: false
          type: string
          format: date
        - in: query
          name: toDate
          description: End date of the transaction range (inclusive)
          required: false
          type: string
          format: date
      produces:
        - application/json
      responses:
        "200":
          description: Transactions retrieved successfully
          schema:
            $ref: "#/definitions/TransactionListResponse"
        "401":
          description: Unauthorized user
        "404":
          description: Account not found
        "500":
          description: Internal Server Error

  /v2/transactions/account/{transactionID}:
    get:
      tags:
        - User Accounts and Transactions
      summary: Retrieve a specific transaction
      description: API for retrieving a specific transaction
      security:
        - Bearer: []
      parameters:
        - in: path
          name: transactionID
          description: ID of a transaction
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: Transaction retrieved successfully
          schema:
            $ref: "#/definitions/TransactionDetailResponse"
        "401":
          description: Unauthorized user
        "404":
          description: Transaction not found
        "500":
          description: Internal Server Error

    put:
      tags:
        - User Accounts and Transactions
      summary: Update transaction's category and note
      description: API for updating a transaction. `category` is the dropdown value, `note` is the user annotation.
      security:
        - Bearer: []
      parameters:
        - in: path
          name: transactionID
          description: ID of a transaction
          required: true
          type: string
        - in: body
          name: transaction
          description: Modified transaction payload
          required: true
          schema:
            $ref: "#/definitions/TransactionUpdateRequest"
      produces:
        - application/json
      responses:
        "200":
          description: Transaction updated successfully
          schema:
            $ref: "#/definitions/TransactionUpdateResponse"
        "401":
          description: Unauthorized user
        "404":
          description: Transaction not found
        "500":
          description: Internal Server Error

definitions:
  User:
    type: object
    properties:
      email:
        type: string
        description: User email
      password:
        type: string
        description: User password
      firstName:
        type: string
        description: User first name
      lastName:
        type: string
        description: User last name
      userName:
        type: string
        description: User public name

  Login:
    type: object
    properties:
      email:
        type: string
        description: User email
      password:
        type: string
        description: User password

  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string

  LoginResponse:
    type: object
    properties:
      token:
        type: string

  UserProfile:
    type: object
    properties:
      email:
        type: string
        description: User email
      firstName:
        type: string
        description: User first name
      lastName:
        type: string
        description: User last name
      userName:
        type: string
        description: User public name

  UserProfileUpdate:
    type: object
    properties:
      firstName:
        type: string
        description: User first name
      lastName:
        type: string
        description: User last name

  UserProfileResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        $ref: "#/definitions/UserProfile"

  AccountListResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          $ref: "#/definitions/AccountResponse"

  AccountResponse:
    type: object
    properties:
      accountID:
        type: string
        description: Account ID
      accountName:
        type: string
        description: Account name
      accountCurrency:
        type: string
        description: Account currency
      amount:
        type: number
        description: Current account balance
        format: double
      amountDescription:
        type: string
        description: Account availability

  Transaction:
    type: object
    properties:
      transactionID:
        type: string
        description: Transaction ID
      accountID:
        type: string
        description: Account ID associated with the transaction
      transactionType:
        type: string
        description: Type of transaction
      date:
        type: string
        format: date-time
        description: Date of transaction
      description:
        type: string
        description: Description of transaction
      amount:
        type: number
        description: Transaction amount
      balance:
        type: number
        format: double
        description: Available balance after transaction
      category:
        type: string
        description: Category selected from the dropdown list
      note:
        type: string
        description: User note attached to the transaction

  TransactionListResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          accountID:
            type: string
          page:
            type: integer
          limit:
            type: integer
          totalTransactions:
            type: integer
          totalPages:
            type: integer
          transactions:
            type: array
            items:
              $ref: "#/definitions/Transaction"

  TransactionDetailResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        $ref: "#/definitions/Transaction"

  TransactionUpdateRequest:
    type: object
    properties:
      category:
        type: string
        description: Category ID selected from the dropdown (values come from GET /v2/categories)
      note:
        type: string
        description: New user note attached to the transaction

  TransactionUpdateResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          transactionID:
            type: string
          category:
            type: string
          note:
            type: string

  Category:
    type: object
    properties:
      id:
        type: string
        description: Unique identifier of the category
      label:
        type: string
        description: Human-readable category name displayed in the dropdown (e.g. "Food", "Salary")

  CategoryListResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: array
        items:
          $ref: "#/definitions/Category"

  TransactionNote:
    type: object
    properties:
      note:
        type: string

  TransactionResponseNote:
    type: object
    properties:
      note:
        type: string

  UserAccountTransactions:
    type: object
    properties:
      status:
        type: integer
        example: 200
      message:
        type: string
        example: Success!
      body:
        type: array
        items:
          type: object
          properties:
            _id:
              type: string
            accountId:
              type: string
            creationDate:
              type: string
            description:
              type: string
            amount:
              type: number
            balance:
              type: number
            transactionType:
              type: number
            transactionCategory:
              type: number
            notes:
              type: string
